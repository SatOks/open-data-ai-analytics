#cloud-config
# Cloud-init configuration for Open Data AI Analytics project
# This script runs on first boot of Azure VM

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git

runcmd:
  # Install Docker
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  
  # Start and enable Docker
  - systemctl start docker
  - systemctl enable docker
  
  # Add default user to docker group
  - usermod -aG docker azureuser
  
  # Create project directory
  - mkdir -p /home/azureuser/app
  - chown -R azureuser:azureuser /home/azureuser/app
  
  # Clone the repository
  - cd /home/azureuser/app && git clone https://github.com/SatOks/open-data-ai-analytics.git .
  
  # Create necessary directories
  - mkdir -p /home/azureuser/app/runtime/db
  - mkdir -p /home/azureuser/app/runtime/results/figures
  - chown -R azureuser:azureuser /home/azureuser/app
  
  # Start the main application
  - cd /home/azureuser/app && docker compose up -d --build
  
  # Start monitoring stack
  - cd /home/azureuser/app && docker compose -f monitoring/docker-compose.monitoring.yml up -d --build

# Write a completion marker file
write_files:
  - path: /home/azureuser/cloud-init-complete.marker
    content: |
      Cloud-init completed at: $(date)
      Project: Open Data AI Analytics
      Services: data_load, data_quality_analysis, data_research, visualization, web
      Monitoring: prometheus, grafana, node-exporter, cadvisor
    owner: azureuser:azureuser
    permissions: '0644'

final_message: "Cloud-init completed. System ready for use."
