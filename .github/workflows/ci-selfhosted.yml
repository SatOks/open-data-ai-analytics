name: CI (self-hosted)

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run"
        required: true
        default: "visualization"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

jobs:
  run-modules-local:
    runs-on: [self-hosted]
    env:
      PYTHONIOENCODING: utf-8
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality_analysis, data_research, visualization]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use system Python (self-hosted)
        run: |
          python --version
          python -m pip --version

      - name: Setup Kaggle Credentials
        if: ${{ inputs.module == 'all' || inputs.module == matrix.module }}
        shell: pwsh
        run: |
          $kaggleJson = '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}'
          $kaggleDir = Join-Path $env:USERPROFILE ".kaggle"
          New-Item -ItemType Directory -Force -Path $kaggleDir | Out-Null
          $kaggleJson | Out-File -FilePath (Join-Path $kaggleDir "kaggle.json") -Encoding ascii
          $kaggleJson | Out-File -FilePath kaggle.json -Encoding ascii

      - name: Install dependencies
        if: ${{ inputs.module == 'all' || inputs.module == matrix.module }}
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Ensure dataset is available
        if: ${{ (inputs.module == 'all' || inputs.module == matrix.module) && matrix.module != 'data_load' }}
        shell: pwsh
        run: |
          $dataFile = "data/raw/Life Expectancy Data.csv"

          if (!(Test-Path $dataFile)) {
            Write-Host "Dataset not found. Attempting Kaggle download..."
            python src/data_load.py
          }

          if (!(Test-Path $dataFile)) {
            $downloaded = Get-ChildItem -Path "data/raw" -Filter "Life Expectancy Data.csv" -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($null -ne $downloaded) {
              New-Item -ItemType Directory -Force -Path "data/raw" | Out-Null
              Copy-Item -Path $downloaded.FullName -Destination $dataFile -Force
              Write-Host "Copied dataset into canonical path: $dataFile"
            }
          }

          if (!(Test-Path $dataFile)) {
            throw "Dataset file is still missing: $dataFile"
          }

          Write-Host "Dataset is ready: $dataFile"

      - name: Run module (${{ matrix.module }})
        if: ${{ inputs.module == 'all' || inputs.module == matrix.module }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts/${{ matrix.module }}" | Out-Null
          # Очищуємо попередні графіки, якщо є
          if (Test-Path "reports/figures/*.png") { Remove-Item reports/figures/*.png -Force }
          
          Write-Host "Запуск ${{ matrix.module }}..."
          python "src/${{ matrix.module }}.py" > "artifacts/${{ matrix.module }}/run.log" 2>&1

      - name: Upload artifacts
        if: ${{ (inputs.module == 'all' || inputs.module == matrix.module) && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}-selfhosted
          path: |
            artifacts/${{ matrix.module }}/run.log
            reports/figures/*.png
          if-no-files-found: ignore
