name: CI (self-hosted)

on:
  workflow_dispatch:

jobs:
  run-visualization-local:
    runs-on: [self-hosted]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use system Python (self-hosted)
        run: |
          python --version
          python -m pip --version

      - name: Setup Kaggle Credentials
        shell: pwsh
        run: |
          $kaggleJson = '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}'
          $kaggleJson | Out-File -FilePath kaggle.json -Encoding utf8

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Download Data
        # Завантажуємо дані локально, щоб модулі мали з чим працювати
        run: python src/data_load.py

      - name: Run visualization module
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts\visualization
          # Очищуємо попередні графіки, якщо є
          if (Test-Path "reports\figures\*.png") { Remove-Item reports\figures\*.png -Force }
          
          Write-Host "Запуск visualization..."
          python src/visualization.py > artifacts\visualization\run.log 2>&1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-visualization-selfhosted
          path: |
            artifacts/visualization/run.log
            reports/figures/*.png
          if-no-files-found: ignore
