# Dashboard provisioning for Grafana
# Automatically loads dashboards from the dashboards directory

apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: 'Open Data AI Analytics'
    folderUid: 'odaa'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
